name: CI - Good Cell SAS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: goodcell_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd MYGOODCELL/backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Import database
        run: |
          mysql -u root -h 127.0.0.1 < MYGOODCELL/database/goodcell_db.sql

      - name: Run tests
        run: |
          cd MYGOODCELL/backend
          pytest test_main.py -v